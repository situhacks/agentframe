<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Automation POV - Post 1 Hero</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --surface: #ffffff;
      --text: #171717;
      --muted: #68645e;
      --divider: #d8d2c7;
      --accent: #b64a2f;
      --accent-soft: #e8b8a8;
      --boundary: #2f3a45;
      --display: Aptos, Inter, system-ui, sans-serif;
      --body: Aptos, Inter, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #e9e4da;
      color: var(--text);
      font-family: var(--body);
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .post {
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(circle at 84% 18%, rgba(232, 184, 168, 0.32), transparent 260px),
        var(--bg);
      border: 1px solid rgba(23, 23, 23, 0.08);
    }

    .frame {
      position: absolute;
      inset: 84px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 52px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 42px;
      height: 2px;
      background: var(--accent);
      content: "";
    }

    h1 {
      max-width: 850px;
      margin: 28px 0 0;
      font-family: var(--display);
      font-size: 76px;
      font-weight: 700;
      letter-spacing: -0.055em;
      line-height: 0.94;
    }

    .stage {
      position: relative;
      display: grid;
      align-items: end;
      min-height: 500px;
    }

    .boundary-card {
      position: absolute;
      right: 170px;
      bottom: 12px;
      width: 596px;
      height: 378px;
      border: 3px solid var(--accent);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.56);
    }

    .boundary-card::before {
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(47, 58, 69, 0.15);
      border-radius: 18px;
      content: "";
    }

    .boundary-label {
      position: absolute;
      top: -16px;
      left: 34px;
      padding: 6px 12px;
      border: 1px solid var(--divider);
      border-radius: 999px;
      background: var(--bg);
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .agent {
      position: absolute;
      top: 128px;
      left: 64px;
      width: 148px;
      height: 148px;
      display: grid;
      place-items: center;
      border: 2px solid var(--boundary);
      border-radius: 50%;
      background: var(--surface);
      color: var(--text);
      font-family: var(--display);
      font-size: 28px;
      font-weight: 700;
    }

    .node {
      position: absolute;
      min-width: 124px;
      padding: 15px 20px;
      border: 1px solid rgba(47, 58, 69, 0.24);
      border-radius: 999px;
      background: var(--surface);
      color: var(--boundary);
      font-family: var(--display);
      font-size: 23px;
      font-weight: 700;
      text-align: center;
    }

    .node.read {
      top: 76px;
      left: 352px;
    }

    .node.draft {
      top: 162px;
      left: 408px;
    }

    .node.ask {
      top: 252px;
      left: 340px;
    }

    .node.write {
      right: 0;
      bottom: 74px;
      border-color: rgba(182, 74, 47, 0.4);
      background: #fbf2ee;
      color: var(--accent);
    }

    .outside-note {
      position: absolute;
      right: 8px;
      bottom: 42px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    svg.lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 0;
      bottom: 58px;
      width: 340px;
      padding: 24px 26px;
      border-left: 3px solid var(--accent);
      background: rgba(255, 255, 255, 0.62);
      color: var(--boundary);
      font-size: 24px;
      font-weight: 600;
      line-height: 1.22;
    }

    .footer {
      max-width: 740px;
      color: var(--muted);
      font-size: 21px;
      font-weight: 600;
      line-height: 1.3;
    }

    .marks {
      position: absolute;
      right: 90px;
      top: 82px;
      display: grid;
      gap: 10px;
      opacity: 0.55;
    }

    .marks span {
      width: 58px;
      height: 2px;
      background: var(--divider);
    }

    @media (max-width: 1120px) {
      body {
        padding: 0;
      }

      .post {
        width: 100vw;
        height: 100vw;
      }
    }
  </style>
</head>
<body>
  <main class="post" aria-label="LinkedIn hero image about AI agent permission boundaries">
    <div class="frame">
      <header>
        <div class="eyebrow">AI automation POV</div>
        <h1>The useful agent knows its boundary.</h1>
      </header>

      <section class="stage" aria-label="Permission boundary diagram">
        <div class="caption">The question is not how much it can do. It is what it should never touch.</div>

        <div class="boundary-card">
          <div class="boundary-label">Allowed scope</div>
          <svg class="lines" viewBox="0 0 648 378" aria-hidden="true">
            <path d="M212 202 C282 144 316 106 352 102" fill="none" stroke="#d8d2c7" stroke-width="3"/>
            <path d="M212 202 C300 188 344 186 408 188" fill="none" stroke="#d8d2c7" stroke-width="3"/>
            <path d="M212 202 C282 260 316 282 340 278" fill="none" stroke="#d8d2c7" stroke-width="3"/>
            <path d="M540 246 C604 250 644 266 682 292" fill="none" stroke="#b64a2f" stroke-dasharray="8 10" stroke-width="3"/>
          </svg>
          <div class="agent">Agent</div>
          <div class="node read">Read</div>
          <div class="node draft">Draft</div>
          <div class="node ask">Ask</div>
        </div>

        <div class="node write">Write</div>
        <div class="outside-note">outside boundary</div>
      </section>

      <footer class="footer">AI automation is an operating model problem before it is a model problem.</footer>
    </div>

    <div class="marks" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </main>
</body>
</html>
