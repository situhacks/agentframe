<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{deliverable_type}} — {{title}}</title>

<!-- System fallback display + body font (Inter is the closest free analog to Aptos) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Campaign-provided display font (interpolated to a <link> tag or empty string) -->
{{cover_font_link}}

<style>
  /* === RESET === */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* === PRINT CANVAS: 8.5 x 11 inch at 300dpi === */
  html, body {
    width: 2550px;
    height: 3300px;
    overflow: hidden;
    background: #FFFFFF;
    color: #1A1A1A;
    font-family: 'Inter', 'Aptos', 'Calibri', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  body {
    position: relative;
  }

  /* === SHARED METADATA GRID === */
  .metadata-grid {
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 48px;
    row-gap: 24px;
    align-items: baseline;
  }
  .metadata-label {
    font-family: 'Inter', 'Aptos', sans-serif;
    font-size: 30px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #6B6B6B;
    white-space: nowrap;
  }
  .metadata-value {
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 30px;
    color: #1A1A1A;
    font-weight: 400;
  }
  .author-date {
    position: absolute;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 28px;
    color: #6B6B6B;
  }

  /* ============================================================ */
  /* RESTRAINED VARIANT — system fallback (no display font)        */
  /* ============================================================ */

  body.restrained .panel { display: none; }

  body.restrained .left-rule {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 16px;
    background: var(--accent);
  }
  body.restrained .title-block {
    position: absolute;
    left: 280px;
    bottom: 760px;
    width: 1900px;
  }
  body.restrained .title-block .deliverable-type {
    font-family: 'Inter', 'Aptos', sans-serif;
    font-size: 38px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 64px;
  }
  body.restrained .title-block .title {
    font-family: 'Inter', 'Aptos', sans-serif;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.02;
    letter-spacing: -0.018em;
    /* Auto-fit JS sets actual font-size; this is the starting hero size */
    font-size: 240px;
  }
  body.restrained .metadata {
    position: absolute;
    bottom: 360px;
    right: 280px;
    max-width: 1100px;
    text-align: left;
  }
  body.restrained .author-date {
    bottom: 180px;
    right: 280px;
  }

  /* ============================================================ */
  /* EXPRESSIVE VARIANT — campaign DL provides display font + motif */
  /* ============================================================ */

  body.expressive .left-rule { display: none; }
  body.expressive .title-block { display: none; }

  body.expressive .panel {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1380px;  /* ~42% of 3300px */
    background: var(--accent);
    overflow: hidden;
  }
  body.expressive .panel .deliverable-type {
    position: absolute;
    top: 220px;
    left: 280px;
    font-family: 'Inter', 'Aptos', sans-serif;
    font-size: 36px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: rgba(255, 255, 255, 0.72);
  }
  body.expressive .panel .title {
    position: absolute;
    left: 280px;
    bottom: 180px;
    right: 600px;
    font-family: var(--display-font), 'Inter', 'Aptos', sans-serif;
    font-weight: 400;
    color: #FFFFFF;
    line-height: 0.96;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    /* Auto-fit JS sets actual font-size; this is the starting hero size */
    font-size: 320px;
  }
  body.expressive .panel .motif {
    position: absolute;
    right: 120px;
    bottom: 120px;
    width: 380px;
    height: 380px;
  }
  body.expressive .panel .motif svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  body.expressive .metadata {
    position: absolute;
    bottom: 360px;
    left: 280px;
    max-width: 1400px;
  }
  body.expressive .author-date {
    bottom: 180px;
    right: 280px;
  }
</style>
</head>
<body class="{{variant_class}}" style="--accent: {{accent_hue}}; --display-font: '{{cover_font_family}}';">

  <!-- Restrained: full-edge accent rule on left margin -->
  <div class="left-rule"></div>

  <!-- Expressive: full-bleed accent panel covers top ~40% of page -->
  <div class="panel">
    <div class="deliverable-type">{{deliverable_type}}</div>
    <h1 class="title" id="title-expressive">{{title}}</h1>
    <div class="motif">{{cover_motif_svg}}</div>
  </div>

  <!-- Restrained: title block in lower portion -->
  <div class="title-block">
    <div class="deliverable-type">{{deliverable_type}}</div>
    <h1 class="title" id="title-restrained">{{title}}</h1>
  </div>

  <!-- Metadata grid (both variants) -->
  <div class="metadata">
    <div class="metadata-grid">
      {{metadata_rows_html}}
    </div>
  </div>

  <!-- Author + date (both variants) -->
  <div class="author-date">{{author}} &nbsp;&middot;&nbsp; {{date}}</div>

<script>
  // Auto-fit title: reduce font-size in 8px steps until height fits within budget AND line count is within max.
  // Starting size, min size, and budgets are tuned per variant.
  function autoFit(el, maxHeightPx, maxLines, startPx, minPx, stepPx) {
    if (!el) return;
    let size = startPx;
    el.style.fontSize = size + 'px';
    let attempts = 0;
    while (size > minPx && attempts < 40) {
      var lh = parseFloat(getComputedStyle(el).lineHeight);
      var lines = Math.round(el.offsetHeight / lh);
      if (el.offsetHeight <= maxHeightPx && lines <= maxLines) break;
      size -= stepPx;
      el.style.fontSize = size + 'px';
      attempts++;
    }
  }

  function isVisible(el) {
    return !!(el && el.offsetParent !== null);
  }

  function fitAll() {
    var restrained = document.getElementById('title-restrained');
    if (isVisible(restrained)) {
      // Restrained: budget ~600px tall, max 3 lines, start at 240px (~58pt) down to 120px (~29pt)
      autoFit(restrained, 600, 3, 240, 120, 8);
    }
    var expressive = document.getElementById('title-expressive');
    if (isVisible(expressive)) {
      // Expressive: budget ~820px tall, max 3 lines, start at 320px (~77pt) down to 160px (~38pt)
      autoFit(expressive, 820, 3, 320, 160, 8);
    }
    document.body.setAttribute('data-render-ready', 'true');
  }

  // Wait for fonts to settle before measuring (custom display fonts can shift metrics).
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(fitAll);
  } else {
    window.addEventListener('load', fitAll);
  }
</script>
</body>
</html>
